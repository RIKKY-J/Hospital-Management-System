<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Book Appointment — City Hospital</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>City Hospital</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/book.html" aria-current="page">Book Appointment</a>
      <a href="/about.html">About</a>
      <a href="/staff.html">Staff Login</a>
    </nav>
  </header>

  <main>
    <section class="card full">
      <h2>Book an Appointment</h2>
      <form id="bookForm">
        <label>Name<input name="name" required></label>
        <label>Email<input name="email" type="email"></label>
        <label>Phone<input name="phone"></label>
        <label>Doctor<select id="doctorSelect" name="doctorId" required></select></label>
        <label>Date<input name="date" type="date" required></label>
        <label>Time<input name="time" type="time" required></label>
        <button type="submit" class="btn">Book</button>
      </form>
      <div id="msg" class="muted"></div>
    </section>

    <section class="card full">
      <h3>Upcoming Appointments</h3>
      <ul id="appts" class="list"></ul>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    async function loadDoctors(){
      const r = await fetch('/api/doctors');
      const doctors = await r.json();
      const sel = document.getElementById('doctorSelect');
      sel.innerHTML = doctors.map(d => `<option value="${d.id}">${d.name} - ${d.specialty}</option>`).join('');
    }
    async function loadAppointments(){
      const r = await fetch('/api/appointments');
      const appts = await r.json();
      const list = document.getElementById('appts');
      if(!appts.length) list.innerHTML = '<li>No appointments yet</li>';
      else list.innerHTML = appts.map(a => `<li>${a.date} ${a.time} — ${a.name} (doctor id ${a.doctorId})</li>`).join('');
    }
    window.addEventListener('load', ()=>{
      loadDoctors();
      loadAppointments();
      document.getElementById('bookForm').addEventListener('submit', async (e)=>{
        e.preventDefault();
        const fd = new FormData(e.target);
        const body = Object.fromEntries(fd.entries());
        const res = await fetch('/api/appointments', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
        const data = await res.json();
        const msg = document.getElementById('msg');
        if(data.success){ msg.textContent='Appointment booked!'; e.target.reset(); loadAppointments(); }
        else msg.textContent=data.error||'Error';
      });
    });
  </script>
</body>
</html>
